services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fgl_erp
      POSTGRES_USER: fgl
      POSTGRES_PASSWORD: fglpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fgl -d fgl_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: fgl_erp
      POSTGRES_USER: fgl
      POSTGRES_PASSWORD: fglpass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      SECRET_KEY: dev-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
